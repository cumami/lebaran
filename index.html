<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twibbon Hari BPR Syariah 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .canvas-container canvas { touch-action: none; cursor: move; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: #e2e8f0;
            border-radius: 10px;
            height: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #059669;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponen Icon Sederhana
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            // Kita langsung masukkan path/URL file yang Anda berikan
            const TWIBBON_IMAGE = "haribprs.png"; 
            
            const [userImage, setUserImage] = useState(null);
            const canvasRef = useRef(null);
            const [scale, setScale] = useState(1);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            // Handle Photo Upload
            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setUserImage(reader.result);
                    setScale(1);
                    setPosition({ x: 0, y: 0 });
                };
                reader.readAsDataURL(file);
            };

            // Drawing Logic
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 1080; // Resolusi Tinggi Square
                canvas.width = size;
                canvas.height = size;

                const draw = async () => {
                    ctx.clearRect(0, 0, size, size);

                    // 1. Gambar Foto User di Layer Bawah
                    if (userImage) {
                        const img = new Image();
                        img.src = userImage;
                        await new Promise(r => img.onload = r);
                        
                        const aspect = img.width / img.height;
                        let drawW, drawH;
                        
                        if (aspect > 1) {
                            drawH = size * scale;
                            drawW = drawH * aspect;
                        } else {
                            drawW = size * scale;
                            drawH = drawW / aspect;
                        }

                        ctx.drawImage(
                            img, 
                            (size - drawW) / 2 + position.x, 
                            (size - drawH) / 2 + position.y, 
                            drawW, 
                            drawH
                        );
                    } else {
                        ctx.fillStyle = '#f8fafc';
                        ctx.fillRect(0, 0, size, size);
                    }

                    // 2. Gambar Frame Twibbon di Layer Atas
                    const frame = new Image();
                    frame.src = TWIBBON_IMAGE;
                    // Note: Jika file JPG tidak transparan, foto user akan tertutup.
                    // Idealnya file ini adalah PNG transparan.
                    await new Promise(r => frame.onload = r);
                    ctx.drawImage(frame, 0, 0, size, size);
                };

                draw();
            }, [userImage, scale, position]);

            // Drag Logic
            const handleStart = (e) => {
                if (!userImage) return;
                setIsDragging(true);
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setDragStart({ x: clientX - position.x, y: clientY - position.y });
            };

            const handleMove = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setPosition({ x: clientX - dragStart.x, y: clientY - dragStart.y });
            };

            const handleEnd = () => setIsDragging(false);

            const download = () => {
                const canvas = canvasRef.current;
                const link = document.createElement('a');
                link.download = `twibbon-bprs-2026.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-white border-b px-6 h-16 flex items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-emerald-600 p-2 rounded-lg text-white">
                                <Icon name="camera" size={20} />
                            </div>
                            <span className="text-lg font-extrabold text-slate-800 tracking-tight">
                                BPRS<span className="text-emerald-600">Twibbon</span>
                            </span>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 flex flex-col lg:flex-row gap-10 items-center lg:items-start justify-center">
                        
                        {/* Area Editor */}
                        <div className="w-full max-w-[500px] fade-in">
                            <div className="bg-white p-4 rounded-[2rem] shadow-2xl border border-slate-100">
                                <div 
                                    className="relative aspect-square w-full rounded-2xl overflow-hidden bg-slate-100 canvas-container"
                                    onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd} onMouseLeave={handleEnd}
                                    onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd}
                                >
                                    <canvas ref={canvasRef} className="w-full h-full" />
                                    
                                    {!userImage && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm pointer-events-none text-center p-6">
                                            <div className="bg-emerald-50 p-5 rounded-full mb-4 text-emerald-600 shadow-sm">
                                                <Icon name="image" size={40} />
                                            </div>
                                            <p className="font-bold text-slate-700">Selamat Hari BPR Syariah!</p>
                                            <p className="text-sm text-slate-500 mt-1">Silakan unggah foto Anda untuk memulai</p>
                                        </div>
                                    )}
                                </div>
                                
                                {userImage && (
                                    <div className="mt-6 space-y-4 px-2">
                                        <div className="flex items-center justify-between text-[10px] font-black uppercase tracking-widest text-slate-400">
                                            <span className="flex items-center gap-1"><Icon name="move" size={12}/> Geser Foto</span>
                                            <span>Zoom</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <Icon name="minus" size={16} className="text-slate-300" />
                                            <input 
                                                type="range" min="0.5" max="3" step="0.01" 
                                                value={scale} onChange={e => setScale(parseFloat(e.target.value))} 
                                                className="flex-grow cursor-pointer"
                                            />
                                            <Icon name="plus" size={16} className="text-slate-300" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Area Kontrol */}
                        <div className="w-full lg:max-w-md space-y-6 fade-in">
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                                <h1 className="text-2xl font-black text-slate-900 mb-2">Hari BPR Syariah</h1>
                                <p className="text-slate-500 mb-8 leading-relaxed">07 Maret 2026 — Peluang dan Tantangan di Era Digitalisasi.</p>
                                
                                <div className="space-y-6">
                                    {/* Tombol Upload */}
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-3">1. Unggah Foto Anda</label>
                                        <label className="relative group flex items-center justify-center w-full py-4 border-2 border-dashed border-emerald-200 bg-emerald-50 rounded-2xl cursor-pointer hover:bg-emerald-100 transition-all">
                                            <div className="flex items-center gap-3 text-emerald-700 font-bold">
                                                <Icon name="upload" size={20} />
                                                <span>{userImage ? "Ganti Foto" : "Pilih File Gambar"}</span>
                                            </div>
                                            <input type="file" accept="image/*" onChange={handlePhotoUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        </label>
                                    </div>

                                    {/* Tombol Download */}
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-3">2. Selesaikan</label>
                                        <button 
                                            onClick={download}
                                            disabled={!userImage}
                                            className={`w-full py-5 rounded-2xl font-black flex items-center justify-center gap-3 transition-all shadow-lg ${
                                                userImage 
                                                ? 'bg-emerald-600 text-white hover:bg-emerald-700 hover:scale-[1.02] active:scale-95 shadow-emerald-200' 
                                                : 'bg-slate-100 text-slate-400 cursor-not-allowed shadow-none'
                                            }`}
                                        >
                                            <Icon name="download" />
                                            Download Twibbon
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Info Box */}
                            <div className="bg-slate-900 p-6 rounded-[2rem] text-white shadow-2xl">
                                <div className="flex gap-4">
                                    <div className="p-3 bg-white/10 rounded-xl h-fit">
                                        <Icon name="info" className="text-emerald-400" />
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-sm mb-1">Penting:</h4>
                                        <p className="text-xs text-slate-400 leading-relaxed">
                                            Silakan upload foto terbaik Anda dengan format JPG/JPEG/PNG. 
                                            Atur posisinya, lalu download hasilnya.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="py-12 text-center text-slate-400 text-xs font-bold tracking-widest uppercase">
                        © 2026 BPR SYARIAH INDONESIA • DIGITAL CAMPAIGN • IT Bank Aman Syariah
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
